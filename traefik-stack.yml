version: "3.7"

services:
  traefik:
    image: traefik:3.7
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 5s
        order: stop-first
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 10
        window: 15s
      placement:
        constraints:
          - node.role == manager
    command:
      - --providers.swarm=true
      - --providers.swarm.exposedbydefault=false
      - --providers.swarm.network=proxy
      - --providers.swarm.endpoint=unix:///var/run/docker.sock
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.le.acme.email=${EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
    ports:
      - published: 80
        target: 80
        protocol: tcp
        mode: host
      - published: 443
        target: 443
        protocol: tcp
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt_data:/letsencrypt
    networks:
      - proxy

  mysql:
    image: mariadb:12
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max-allowed-packet=64M
      - --innodb_buffer_pool_size=256M
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 10
        window: 15s
      labels:
        - "traefik.enable=false"
    environment:
      MYSQL_DATABASE: ${MYSQL_USER}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - /srv/sites/${DOMAIN_NAME}/${BACKUP_DATABASE}:/docker-entrypoint-initdb.d/${BACKUP_DATABASE}:ro
    networks:
      - nw-backend
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 5
        window: 15s
      labels:
        - "traefik.enable=false"
    networks:
      - nw-backend

  adminer:
    image: adminer:latest
    ports:
      - "8081:8080"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 15s
      labels:
        - "traefik.enable=false"
        # Colocar o adminer atrás do traefik
        # - "traefik.enable=true"
        # - "traefik.docker.network=proxy"
        # - "traefik.http.routers.adminer-${PROJECT_NAME}.rule=Host(`db.${DOMAIN_NAME}`)"
        # - "traefik.http.routers.adminer-${PROJECT_NAME}.entrypoints=websecure"
        # - "traefik.http.routers.adminer-${PROJECT_NAME}.tls=true"
        # - "traefik.http.routers.adminer-${PROJECT_NAME}.tls.certresolver=le"
        # - "traefik.http.routers.adminer-${PROJECT_NAME}.middlewares=adminer-${PROJECT_NAME}-auth"
        # - "traefik.http.services.adminer-${PROJECT_NAME}.loadbalancer.server.port=8080"
        # # Gere o hash com: echo $(htpasswd -nb admin SUA_SENHA) | sed -e s/\$/\$\$/g
        # - "traefik.http.middlewares.adminer-${PROJECT_NAME}-auth.basicauth.users=${ADMINER_BASIC_AUTH}"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
      ADMINER_DESIGN: pepa-linha-dark
    networks:
      - nw-backend

volumes:
  letsencrypt_data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /data/letsencrypt_data
  mysql_data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /data/mysql_data_${PROJECT_NAME}

networks:
  proxy:
    external: true
  nw-backend:
    external: true
