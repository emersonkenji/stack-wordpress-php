version: "3.7"

services:
  nginx:
    image: nginx:1.25-alpine
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 15s
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=proxy"
        - "traefik.http.routers.wp-${PROJECT_NAME}.rule=Host(`${DOMAIN_NAME}`) || Host(`www.${DOMAIN_NAME}`)"
        - "traefik.http.routers.wp-${PROJECT_NAME}.entrypoints=websecure"
        - "traefik.http.routers.wp-${PROJECT_NAME}.tls=true"
        - "traefik.http.routers.wp-${PROJECT_NAME}.tls.certresolver=le"
        - "traefik.http.services.wp-${PROJECT_NAME}.loadbalancer.server.port=80"
    environment:
      - NGINX_HOST=${DOMAIN_NAME}
    configs:
      - source: nginx_default_conf
        target: /etc/nginx/templates/default.conf.template
      - source: nginx_server_conf
        target: /etc/nginx/conf.d/common/_server.conf
    volumes:
      - wp_data:/var/www/html
    networks:
      - proxy
      - nw-wp-internal
    depends_on:
      - wpphpfpm

  wpphpfpm:
    image: wordpress:php8.3-fpm
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 15s
      labels:
        - "traefik.enable=false"
    environment:
      WORDPRESS_DB_HOST: mysql
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_DB_NAME: ${MYSQL_USER}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX}
      # OPcache para produção
      PHP_OPCACHE_VALIDATE_TIMESTAMPS: "0"
      PHP_OPCACHE_REVALIDATE_FREQ: "60"
    volumes:
      - wp_data:/var/www/html
      - ./php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - nw-wp-internal
      - nw-backend

configs:
  nginx_default_conf:
    file: ./config/nginx/templates/default.conf.template
  nginx_server_conf:
    file: ./config/nginx/server.conf

volumes:
  wp_data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /srv/sites/${DOMAIN_NAME}

networks:
  proxy:
    external: true
  nw-wp-internal:
    driver: overlay
  nw-backend:
    external: true
